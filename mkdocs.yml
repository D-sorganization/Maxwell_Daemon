site_name: Maxwell-Daemon
site_description: Multi-backend autonomous code agent orchestrator
site_url: https://d-sorganization.github.io/Maxwell-Daemon/
repo_url: https://github.com/D-sorganization/Maxwell-Daemon
repo_name: D-sorganization/Maxwell-Daemon

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Quick start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
      - Autonomous workflow: getting-started/autonomous-workflow.md
      - Examples: getting-started/examples.md
      - Troubleshooting: getting-started/troubleshooting.md
  - Architecture:
      - Overview: architecture/overview.md
      - Backend interface: architecture/backends.md
      - Design by Contract: architecture/contracts.md
      - Governed work items: architecture/work-items.md
      - Durable artifacts: architecture/artifacts.md
      - Browser automation: architecture/browser-automation.md
      - Task graphs: architecture/task-graphs.md
      - Source-controlled checks: architecture/checks.md
  - Operations:
      - Deployment guide: operations/deployment.md
      - Deployment (Ansible): operations/ansible.md
      - Observability: operations/observability.md
      - Budgets: operations/budgets.md
      - Tailscale fleet: operations/tailscale.md
      - GitHub webhooks: operations/webhooks.md
      - Beta release readiness: operations/release-readiness.md
      - Production release readiness: operations/production-readiness.md
      - Documentation publishing: operations/docs-publishing.md
  - Reference:
      - CLI: reference/cli.md
      - Tasks CLI: reference/tasks-cli.md
      - Action ledger: reference/action-ledger.md
      - REST API: reference/api.md
      - OpenAPI: reference/openapi.md
      - Configuration: reference/configuration.md
  - Development:
      - Agentic orchestrator strategy: development/planning/orchestrator_market_comparison.md
      - Open-source agents review: development/open_source_agents_review.md
      - IJFW feature review: development/ijfw_feature_review.md
      - Feature evaluations:
          - AST repo mapping: feature_evaluation/01_ast_repo_mapping.md
          - Sandboxing and auto-fix loops: feature_evaluation/02_docker_sandboxing_and_auto_fix.md
          - MCP integration: feature_evaluation/03_mcp_integration.md
          - Multi-agent SOPs and QA: feature_evaluation/04_multi_agent_sops_and_trident_qa.md
          - Phase gates and memory: feature_evaluation/05_phase_gate_workflows_and_memory.md
  - Community:
      - Contributing: contributing.md
      - Roadmap and Governance: community/roadmap-governance.md
