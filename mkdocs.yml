site_name: Maxwell-Daemon
site_description: Multi-backend autonomous code agent orchestrator
site_url: https://d-sorganization.github.io/Maxwell-Daemon/
repo_url: https://github.com/D-sorganization/Maxwell-Daemon
repo_name: D-sorganization/Maxwell-Daemon

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Quick start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
      - Autonomous workflow: getting-started/autonomous-workflow.md
      - Examples: getting-started/examples.md
      - Troubleshooting: getting-started/troubleshooting.md
  - Architecture:
      - Overview: architecture/overview.md
      - Backend interface: architecture/backends.md
      - Design by Contract: architecture/contracts.md
      - Governed work items: architecture/work-items.md
      - Durable artifacts: architecture/artifacts.md
      - Task graphs: architecture/task-graphs.md
  - Operations:
      - Deployment guide: operations/deployment.md
      - Deployment (Ansible): operations/ansible.md
      - Observability: operations/observability.md
      - Budgets: operations/budgets.md
      - GitHub webhooks: operations/webhooks.md
      - Documentation publishing: operations/docs-publishing.md
  - Reference:
      - CLI: reference/cli.md
      - Tasks CLI: reference/tasks-cli.md
      - REST API: reference/api.md
      - Configuration: reference/configuration.md
  - Community:
      - Contributing: contributing.md
      - Roadmap and Governance: community/roadmap-governance.md
