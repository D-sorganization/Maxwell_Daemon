name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:




  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          ONLINE=$(gh api -H "Accept: application/vnd.github+json" /orgs/${{ github.repository_owner }}/actions/runners --paginate \
            --jq 'if .runners then [.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length else 0 end' \
            2>/dev/null || echo "0")
          if ! [[ "$ONLINE" =~ ^[0-9]+$ ]]; then ONLINE=0; fi
          if [[ "$ONLINE" -gt 0 ]]; then
            echo "runner=d-sorg-fleet" >> $GITHUB_OUTPUT
            echo "Self-hosted runner online - routing locally"
          else
            echo "::error::No local self-hosted runner available; failing closed"
            exit 1
          fi

  build:
    name: Build MkDocs site
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install --upgrade pip
      - run: .venv/bin/python -m pip install ".[docs]"
      - run: .venv/bin/mkdocs build --strict --site-dir site
      - name: Upload Pages artifact
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    needs: [pick-runner, build]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
