name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: [self-hosted, d-sorg-fleet-4core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[dev]"
      - name: Ruff check
        run: .venv/bin/python -m ruff check . --output-format=github
      - name: Ruff format check
        run: .venv/bin/python -m ruff format --check .

  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: [self-hosted, d-sorg-fleet-4core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[dev]"
      - run: .venv/bin/python -m mypy maxwell_daemon
      - name: Mypy on tests
        run: .venv/bin/python -m mypy tests --no-strict-optional
        continue-on-error: true  # Tighten iteratively

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: [self-hosted, d-sorg-fleet-4core]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[dev]"
      - name: Run tests
        run: .venv/bin/python -m pytest -p no:xvfb --cov=maxwell_daemon --cov-report=xml --cov-report=term-missing
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  coverage-floor:
    name: Coverage floor (ratchet)
    needs: test
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: [self-hosted, d-sorg-fleet-4core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: coverage-xml
      - run: python scripts/check_coverage_floor.py --xml coverage.xml

  file-size-budget:
    name: File size budget
    runs-on: [self-hosted, d-sorg-fleet-4core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_file_size_budget.py

  todo-fixme:
    name: No untracked TODO/FIXME
    runs-on: [self-hosted, d-sorg-fleet-4core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_todo_fixme.py maxwell_daemon

  security:
    name: Security scans
    runs-on: [self-hosted, d-sorg-fleet-4core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install bandit pip-audit
      - name: Bandit (static analysis)
        run: .venv/bin/python -m bandit -r maxwell_daemon -c pyproject.toml
      - name: pip-audit (dependency vulnerabilities)
        continue-on-error: true  # report but don't fail until we triage
        run: .venv/bin/python -m pip_audit --desc --strict

  build:
    name: Build distribution
    needs: [lint, typecheck, test]
    runs-on: [self-hosted, d-sorg-fleet-4core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install build
      - run: .venv/bin/python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
