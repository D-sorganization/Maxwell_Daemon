name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[dev]"
      - name: Ruff check
        run: .venv/bin/python -m ruff check . --output-format=github
      - name: Ruff format check
        run: .venv/bin/python -m ruff format --check .

  typecheck:
    name: Typecheck (mypy --strict)
    needs: lint
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[dev]"
      - run: .venv/bin/python -m mypy maxwell_daemon
      - name: Mypy on tests
        run: .venv/bin/python -m mypy tests --no-strict-optional
        continue-on-error: true  # Tighten iteratively

  test:
    name: Test (py${{ matrix.python-version }})
    needs: typecheck
    runs-on: d-sorg-fleet
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        python-version: ["3.12", "3.10", "3.11"]
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[ssh,dev]"
      - name: Run tests
        run: .venv/bin/python -m pytest -p no:xvfb --cov=maxwell_daemon --cov-report=xml --cov-report=term-missing
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  coverage-floor:
    name: Coverage floor (ratchet)
    needs: test
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: coverage-xml
      - run: python scripts/check_coverage_floor.py --xml coverage.xml

  file-size-budget:
    name: File size budget
    needs: coverage-floor
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_file_size_budget.py

  todo-fixme:
    name: No untracked TODO/FIXME
    needs: file-size-budget
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_todo_fixme.py maxwell_daemon

  security:
    name: Security scans
    needs: todo-fixme
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install bandit pip-audit
      - name: Bandit (static analysis)
        run: .venv/bin/python -m bandit -r maxwell_daemon -c pyproject.toml
      - name: pip-audit (dependency vulnerabilities)
        run: .venv/bin/python -m pip_audit . --desc --strict

  dependency-locks:
    name: Dependency locks
    needs: security
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - name: Verify uv.lock is fresh
        run: uv lock --check
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-electron/package-lock.json
      - name: Verify desktop package lock
        working-directory: apps/desktop-electron
        run: npm ci --ignore-scripts

  build:
    name: Build distribution
    needs: dependency-locks
    runs-on: d-sorg-fleet
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install build
      - run: .venv/bin/python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  desktop-smoke:
    name: Desktop launcher smoke (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [d-sorg-fleet, [self-hosted, macOS], [self-hosted, Windows]]
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Install built wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel artifact found in dist/"
          }
          python -m pip install $wheel.FullName
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-electron/package-lock.json
      - name: Install desktop dependencies
        working-directory: apps/desktop-electron
        run: npm ci
      - name: Run desktop launch smoke (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/desktop-electron
        run: xvfb-run --auto-servernum npm run smoke:launch
        env:
          ELECTRON_DISABLE_SANDBOX: "1"
          MAXWELL_DESKTOP_LAUNCH_BUDGET_MS: "10000"
      - name: Run desktop launch smoke
        if: runner.os != 'Linux'
        working-directory: apps/desktop-electron
        run: npm run smoke:launch
        env:
          MAXWELL_DESKTOP_LAUNCH_BUDGET_MS: "10000"
