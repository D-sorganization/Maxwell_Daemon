name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  local-only-workflows:
    timeout-minutes: 30
    name: Reject hosted runner routing
    runs-on: d-sorg-fleet
    steps:
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run local-only workflow guard
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_local_only_workflows.py

  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GITHUB_OUTPUT:-}" ]]; then
            echo "::error::GITHUB_OUTPUT is unavailable"
            exit 1
          fi
          mkdir -p "$(dirname "$GITHUB_OUTPUT")"
          echo "runner=d-sorg-fleet" >> "$GITHUB_OUTPUT"
          echo "Desktop fleet runner claimed this job - routing locally"

  lint:
    timeout-minutes: 20
    name: Lint (ruff)
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Purge stale untracked files (self-hosted runner hygiene)
        run: git clean -fdx --exclude=.venv
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv sync --all-extras
      - name: Ruff check
        run: .venv/bin/python -m ruff check . --output-format=github
      - name: Ruff format check
        run: .venv/bin/python -m ruff format --check .

  typecheck:
    timeout-minutes: 30
    name: Typecheck (mypy --strict)
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv sync --all-extras
      - run: .venv/bin/python -m mypy maxwell_daemon
      - name: Mypy on tests
        run: .venv/bin/python -m mypy tests --no-strict-optional
        continue-on-error: true  # Tighten iteratively

  test:
    name: Test (py${{ matrix.python-version }})
    needs: pick-runner
    runs-on: [self-hosted, Linux, X64, d-sorg-fleet]
    timeout-minutes: 45
    env:
      BASELINE_TEST_COUNT: 2471
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        python-version: ["3.12", "3.10", "3.11"]
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv sync --all-extras
      - name: Test count regression guard
        run: |
          COUNT=$(.venv/bin/python -m pytest --collect-only -q 2>&1 | tail -3 | grep -oE "[0-9]+ tests collected" | grep -oE "^[0-9]+" | head -1)
          echo "Collected $COUNT tests; baseline is ${{ env.BASELINE_TEST_COUNT }}"
          [ "$COUNT" -ge "${{ env.BASELINE_TEST_COUNT }}" ] || (echo "::error::Test count $COUNT < baseline ${{ env.BASELINE_TEST_COUNT }}"; exit 1)
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: .venv/bin/python -m pytest -p no:xvfb --timeout=300 --cov=maxwell_daemon --cov-report=xml --cov-report=term-missing
      - name: Run compatibility tests
        if: matrix.python-version != '3.12'
        run: .venv/bin/python -m pytest -p no:xvfb --timeout=300 --no-cov
      - name: Run integration tests (PR only)
        # Phase 1 of #800 - gated to pull_request events so the unit-test
        # fast lane on push/main stays untouched. The default ``pytest``
        # invocation above already exercises ``tests/integration/`` via
        # ``testpaths = ["tests"]`` in ``pyproject.toml``; this step is an
        # explicit, named re-run that surfaces integration failures
        # separately in PR checks for easier triage.
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        run: .venv/bin/python -m pytest tests/integration/ --no-cov -p no:xvfb --timeout=300
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Run benchmarks
        if: matrix.python-version == '3.12'
        run: .venv/bin/python -m pytest benchmarks/ --benchmark-only --no-cov --benchmark-json=benchmark-results.json
      - name: Upload benchmark results
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json

  coverage-floor:
    timeout-minutes: 30
    name: Coverage floor (ratchet)
    needs: [pick-runner, test]
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - run: python scripts/check_coverage_floor.py --xml coverage.xml

  file-size-budget:
    timeout-minutes: 30
    name: File size budget
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python scripts/check_file_size_budget.py


  noqa-ratchet:
    timeout-minutes: 30
    name: noqa ratchet (BLE001 / C901)
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python scripts/check_noqa_ratchet.py
  todo-fixme:
    timeout-minutes: 30
    name: No untracked TODO/FIXME
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python scripts/check_todo_fixme.py maxwell_daemon

  security:
    timeout-minutes: 20
    name: Security scans
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv pip install bandit pip-audit
      - name: Bandit (static analysis)
        run: .venv/bin/python -m bandit -r maxwell_daemon -c pyproject.toml
      - name: pip-audit (dependency vulnerabilities)
        run: .venv/bin/python -m pip_audit . --desc --strict

  dependency-locks:
    timeout-minutes: 60
    name: Dependency locks
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: python -m pip install uv
      - name: Verify uv.lock is fresh
        run: uv lock --check
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: apps/desktop-electron/package-lock.json
      - name: Verify desktop package lock
        working-directory: apps/desktop-electron
        run: npm ci --ignore-scripts

  build:
    timeout-minutes: 60
    name: Build distribution
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv pip install build
      - run: .venv/bin/python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  desktop-smoke:
    timeout-minutes: 60
    name: Desktop launcher smoke (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        # macOS leg removed: org has zero macOS self-hosted runners, so the
        # job sat queued for 200+ minutes and was eventually cancelled. Re-add
        # only when a macOS runner is provisioned, or switch to `macos-14`
        # (GH-hosted) if Actions-minute cost is acceptable.
        include:
          - os: d-sorg-fleet
            runs_on: [self-hosted, Linux, X64, d-sorg-fleet]
          - os: [self-hosted, Windows]
            runs_on: [self-hosted, Windows]
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Force-clean stale Python tool cache (NVMe runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for cache_root in /opt/runner-tool-cache /home/dieterolson/actions-runners/.shared-tool-cache /home/dieterolson/actions-runners-nvme/.shared-tool-cache; do
            if [ -d "$cache_root/Python" ]; then
              echo "Cleaning $cache_root/Python (pre-setup-python)"
              sudo rm -rf "$cache_root/Python"
            fi
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install built wheel
        shell: python
        run: |
          import glob
          import os
          import subprocess
          import sys
          wheels = glob.glob(os.path.join("dist", "*.whl"))
          if not wheels:
              print("No wheel artifact found in dist/")
              sys.exit(1)
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheels[0]])
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: apps/desktop-electron/package-lock.json
      - name: Install desktop dependencies
        working-directory: apps/desktop-electron
        run: npm ci
      - name: Run desktop launch smoke (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/desktop-electron
        run: xvfb-run --auto-servernum npm run smoke:launch
        env:
          ELECTRON_DISABLE_SANDBOX: "1"
          ELECTRON_EXTRA_LAUNCH_ARGS: "--disable-gpu --disable-dev-shm-usage"
          MAXWELL_DESKTOP_LAUNCH_BUDGET_MS: "60000"
      - name: Run desktop launch smoke
        if: runner.os != 'Linux'
        working-directory: apps/desktop-electron
        run: npm run smoke:launch
        env:
          MAXWELL_DESKTOP_LAUNCH_BUDGET_MS: "60000"
  quality-gate:
    name: quality-gate
    timeout-minutes: 5
    needs:
      - lint
      - typecheck
      - test
      - coverage-floor
      - file-size-budget
      - noqa-ratchet
      - todo-fixme
      - security
      - dependency-locks
      - build
      - desktop-smoke
    runs-on: d-sorg-fleet
    steps:
      - name: All checks passed
        run: echo "All required checks passed"
