name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:




  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ONLINE=$(gh api -H "Accept: application/vnd.github+json" /orgs/${{ github.repository_owner }}/actions/runners --paginate \
            --jq 'if .runners then [.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length else 0 end' \
            2>/dev/null || echo "0")
          if ! [[ "$ONLINE" =~ ^[0-9]+$ ]]; then ONLINE=0; fi
          if [[ "$ONLINE" -gt 0 ]]; then
            echo "runner=d-sorg-fleet" >> $GITHUB_OUTPUT
            echo "Self-hosted runner online - routing locally"
          else
            echo "::error::No local self-hosted runner available; failing closed"
            exit 1
          fi

  lint:
    name: Lint (ruff)
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - name: Purge stale untracked files (self-hosted runner hygiene)
        run: git clean -fdx --exclude=.venv
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv sync --all-extras
      - name: Ruff check
        run: .venv/bin/python -m ruff check . --output-format=github
      - name: Ruff format check
        run: .venv/bin/python -m ruff format --check .

  typecheck:
    name: Typecheck (mypy --strict)
    needs: [pick-runner, lint]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv sync --all-extras
      - run: .venv/bin/python -m mypy maxwell_daemon
      - name: Mypy on tests
        run: .venv/bin/python -m mypy tests --no-strict-optional
        continue-on-error: true  # Tighten iteratively

  test:
    name: Test (py${{ matrix.python-version }})
    needs: [pick-runner, typecheck]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        python-version: ["3.12", "3.10", "3.11"]
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv sync --all-extras
      - name: Run tests
        run: .venv/bin/python -m pytest -p no:xvfb --cov=maxwell_daemon --cov-report=xml --cov-report=term-missing
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Run benchmarks
        if: matrix.python-version == '3.12'
        run: .venv/bin/python -m pytest benchmarks/ --benchmark-only --no-cov --benchmark-json=benchmark-results.json
      - name: Upload benchmark results
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.json

  coverage-floor:
    name: Coverage floor (ratchet)
    needs: [pick-runner, test]
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: coverage-xml
      - run: python scripts/check_coverage_floor.py --xml coverage.xml

  file-size-budget:
    name: File size budget
    needs: [pick-runner, coverage-floor]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_file_size_budget.py

  todo-fixme:
    name: No untracked TODO/FIXME
    needs: [pick-runner, file-size-budget]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check_todo_fixme.py maxwell_daemon

  security:
    name: Security scans
    needs: [pick-runner, todo-fixme]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv pip install bandit pip-audit
      - name: Bandit (static analysis)
        run: .venv/bin/python -m bandit -r maxwell_daemon -c pyproject.toml
      - name: pip-audit (dependency vulnerabilities)
        run: .venv/bin/python -m pip_audit . --desc --strict

  dependency-locks:
    name: Dependency locks
    needs: [pick-runner, security]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - name: Verify uv.lock is fresh
        run: uv lock --check
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-electron/package-lock.json
      - name: Verify desktop package lock
        working-directory: apps/desktop-electron
        run: npm ci --ignore-scripts

  build:
    name: Build distribution
    needs: [pick-runner, dependency-locks]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: uv venv .venv --python $(which python)
      - run: uv pip install build
      - run: .venv/bin/python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  desktop-smoke:
    name: Desktop launcher smoke (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [d-sorg-fleet, [self-hosted, macOS], [self-hosted, Windows]]
    steps:
      - name: Clear stale checkout locks
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE/.git/refs/remotes/pull" -name "*.lock" -type f -delete 2>/dev/null || true
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Install built wheel
        shell: python
        run: |
          import glob
          import os
          import subprocess
          import sys
          wheels = glob.glob(os.path.join("dist", "*.whl"))
          if not wheels:
              print("No wheel artifact found in dist/")
              sys.exit(1)
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheels[0]])
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-electron/package-lock.json
      - name: Install desktop dependencies
        working-directory: apps/desktop-electron
        run: npm ci
      - name: Run desktop launch smoke (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/desktop-electron
        run: xvfb-run --auto-servernum npm run smoke:launch
        env:
          ELECTRON_DISABLE_SANDBOX: "1"
          MAXWELL_DESKTOP_LAUNCH_BUDGET_MS: "10000"
      - name: Run desktop launch smoke
        if: runner.os != 'Linux'
        working-directory: apps/desktop-electron
        run: npm run smoke:launch
        env:
          MAXWELL_DESKTOP_LAUNCH_BUDGET_MS: "10000"
