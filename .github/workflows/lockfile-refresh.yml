name: Nightly Lockfile Refresh

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:




  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN is empty; assuming local runner is available."
            ONLINE=1
          else
            ONLINE=$(gh api -H "Accept: application/vnd.github+json" /orgs/${{ github.repository_owner }}/actions/runners --paginate \
              --jq 'if .runners then [.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length else 0 end' \
              2>/dev/null || echo "0")
          fi
          if ! [[ "$ONLINE" =~ ^[0-9]+$ ]]; then ONLINE=0; fi
          if [[ "$ONLINE" -gt 0 ]]; then
            mkdir -p "$(dirname "$GITHUB_OUTPUT")"
            echo "runner=d-sorg-fleet" >> "$GITHUB_OUTPUT"
            echo "Self-hosted runner online - routing locally"
          else
            echo "::error::No local self-hosted runner available; failing closed"
            exit 1
          fi

  refresh:
    timeout-minutes: 30
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate Maxwell App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.MAXWELL_APP_ID }}
          installation_retrieval_mode: id
          installation_retrieval_payload: ${{ secrets.MAXWELL_APP_INSTALLATION_ID }}
          private_key: ${{ secrets.MAXWELL_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-python@v5
        env:
          AGENT_TOOLSDIRECTORY: ${{ runner.temp }}/_tool_cache
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Purge pip cache
        run: python -m pip cache purge || true
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Update uv lockfile
        run: uv lock --upgrade
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(deps): update uv.lock"
          title: "chore(deps): nightly lockfile refresh"
          body: "Automated nightly update of dependency lockfile via `uv lock --upgrade`."
          branch: "chore/nightly-lockfile-refresh"
          base: "main"
