name: Nightly Lockfile Refresh

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:

jobs:




  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN is empty; assuming local runner is available."
            ONLINE=1
          else
            ONLINE=$(gh api -H "Accept: application/vnd.github+json" /orgs/${{ github.repository_owner }}/actions/runners --paginate \
              --jq 'if .runners then [.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length else 0 end' \
              2>/dev/null || echo "0")
          fi
          if ! [[ "$ONLINE" =~ ^[0-9]+$ ]]; then ONLINE=0; fi
          if [[ "$ONLINE" -gt 0 ]]; then
            mkdir -p "$(dirname "$GITHUB_OUTPUT")"
            echo "runner=d-sorg-fleet" >> "$GITHUB_OUTPUT"
            echo "Self-hosted runner online - routing locally"
          else
            echo "::error::No local self-hosted runner available; failing closed"
            exit 1
          fi

  refresh:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Update uv lockfile
        run: uv lock --upgrade
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(deps): update uv.lock"
          title: "chore(deps): nightly lockfile refresh"
          body: "Automated nightly update of dependency lockfile via `uv lock --upgrade`."
          branch: "chore/nightly-lockfile-refresh"
          base: "main"