name: Nightly Lockfile Refresh

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:

jobs:
  refresh:
    runs-on: d-sorg-fleet
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Update uv lockfile
        run: uv lock --upgrade
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(deps): update uv.lock"
          title: "chore(deps): nightly lockfile refresh"
          body: "Automated nightly update of dependency lockfile via `uv lock --upgrade`."
          branch: "chore/nightly-lockfile-refresh"
          base: "main"