# Example Ansible inventory for a Maxwell-Daemon fleet.
# Copy to inventory.yml and edit before running playbooks.

all:
  vars:
    maxwell_daemon_version: "0.1.0"
    maxwell_daemon_user: maxwell-daemon
    maxwell_daemon_home: /opt/maxwell-daemon
    maxwell_daemon_default_backend: claude

  children:
    maxwell_daemon_fleet:
      hosts:
        worker-1:
          ansible_host: 192.168.1.10
          maxwell_daemon_capacity: 4
          maxwell_daemon_tags: [production]
        worker-2:
          ansible_host: 192.168.1.11
          maxwell_daemon_capacity: 2
          maxwell_daemon_tags: [production]
        dev-laptop:
          ansible_host: 127.0.0.1
          ansible_connection: local
          maxwell_daemon_capacity: 2
          maxwell_daemon_tags: [development]
