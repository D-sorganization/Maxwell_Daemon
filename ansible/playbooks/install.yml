---
# Install Maxwell-Daemon on a fleet node.
#
#   ansible-playbook -i inventory.yml ansible/playbooks/install.yml
#
# Idempotent: safe to re-run. Tightens system config only where required.

- name: Install Maxwell-Daemon
  hosts: maxwell_daemon_fleet
  become: true
  vars:
    maxwell_daemon_bin: "{{ maxwell_daemon_home }}/venv/bin/maxwell-daemon"
    maxwell_daemon_config_dir: "/etc/maxwell-daemon"
    maxwell_daemon_systemd_unit: /etc/systemd/system/maxwell-daemon.service

  tasks:
    - name: Ensure maxwell-daemon user exists
      ansible.builtin.user:
        name: "{{ maxwell_daemon_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ maxwell_daemon_home }}"
        create_home: true

    - name: Ensure required system packages are present
      ansible.builtin.package:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present

    - name: Create config dir
      ansible.builtin.file:
        path: "{{ maxwell_daemon_config_dir }}"
        state: directory
        owner: "{{ maxwell_daemon_user }}"
        group: "{{ maxwell_daemon_user }}"
        mode: "0750"

    - name: Create virtualenv + install maxwell-daemon
      ansible.builtin.pip:
        name: "maxwell-daemon=={{ maxwell_daemon_version }}"
        virtualenv: "{{ maxwell_daemon_home }}/venv"
        virtualenv_command: python3 -m venv
      become_user: "{{ maxwell_daemon_user }}"

    - name: Render maxwell-daemon.yaml from template
      ansible.builtin.template:
        src: ../templates/maxwell-daemon.yaml.j2
        dest: "{{ maxwell_daemon_config_dir }}/maxwell-daemon.yaml"
        owner: "{{ maxwell_daemon_user }}"
        group: "{{ maxwell_daemon_user }}"
        mode: "0640"
      notify: Restart maxwell-daemon

    - name: Install systemd unit
      ansible.builtin.copy:
        dest: "{{ maxwell_daemon_systemd_unit }}"
        mode: "0644"
        content: |
          [Unit]
          Description=Maxwell-Daemon
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ maxwell_daemon_user }}
          Group={{ maxwell_daemon_user }}
          Environment=MAXWELL_CONFIG={{ maxwell_daemon_config_dir }}/maxwell-daemon.yaml
          ExecStart={{ maxwell_daemon_bin }} serve --host 0.0.0.0 --port 8080
          Restart=on-failure
          RestartSec=5s
          # Security hardening
          NoNewPrivileges=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths={{ maxwell_daemon_home }} {{ maxwell_daemon_config_dir }}
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start maxwell-daemon
      ansible.builtin.systemd:
        name: maxwell-daemon
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart maxwell-daemon
      ansible.builtin.systemd:
        name: maxwell-daemon
        state: restarted
