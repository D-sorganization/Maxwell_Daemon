---
# install-maxwell.yml — Install maxwell-daemon, dependencies, and systemd service.
#
# Usage:
#   ansible-playbook -i inventory/fleet.yml install-maxwell.yml
#   ansible-playbook -i inventory/fleet.yml install-maxwell.yml -e maxwell_version=0.2.0

- name: Install maxwell-daemon on maxwell hosts
  hosts: maxwell_primary
  become: true
  gather_facts: true

  roles:
    - maxwell_daemon

  post_tasks:
    - name: Verify service is running
      ansible.builtin.systemd:
        name: maxwell-daemon
      register: svc
      failed_when: svc.status.ActiveState != "active"

    - name: Wait for API to become reachable
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ maxwell_port }}/healthz"
        status_code: 200
      retries: 10
      delay: 3
      register: health_check
      until: health_check.status == 200
