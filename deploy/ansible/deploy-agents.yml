---
# deploy-agents.yml — Deploy agent workers to fleet machines.
#
# Usage:
#   ansible-playbook -i inventory/fleet.yml deploy-agents.yml
#   # Target a subset:
#   ansible-playbook -i inventory/fleet.yml deploy-agents.yml --limit agent-01

- name: Deploy maxwell-daemon agent workers
  hosts: maxwell_agents
  become: true
  gather_facts: true

  roles:
    - maxwell_daemon

  tasks:
    - name: Configure agent to join the primary
      ansible.builtin.template:
        src: roles/maxwell_daemon/templates/config.toml.j2
        dest: "{{ maxwell_config_dir }}/config.toml"
        owner: "{{ maxwell_user }}"
        group: "{{ maxwell_group }}"
        mode: "0640"
      vars:
        maxwell_role: agent
      notify: Restart maxwell-daemon
      no_log: true

    - name: Register agent with primary controller
      ansible.builtin.uri:
        url: "http://{{ primary_host }}:{{ maxwell_port }}/api/v1/fleet/register"
        method: POST
        body_format: json
        body:
          hostname: "{{ ansible_hostname }}"
          ip: "{{ ansible_default_ipv4.address }}"
          roles: "{{ agent_roles | default(['worker']) }}"
        headers:
          Authorization: "Bearer {{ maxwell_admin_token }}"
        status_code: [200, 201, 409]
      vars:
        primary_host: "{{ groups['maxwell_primary'][0] }}"
      when: maxwell_admin_token is defined

  handlers:
    - name: Restart maxwell-daemon
      ansible.builtin.systemd:
        name: maxwell-daemon
        state: restarted
