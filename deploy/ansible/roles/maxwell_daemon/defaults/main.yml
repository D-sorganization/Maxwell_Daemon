---
maxwell_version: "latest"
maxwell_user: maxwell
maxwell_group: maxwell
maxwell_port: 8765
maxwell_config_dir: /etc/maxwell-daemon
maxwell_data_dir: /var/lib/maxwell-daemon
maxwell_log_dir: /var/log/maxwell-daemon
maxwell_venv: /opt/maxwell-daemon/venv

# LLM backend — override per host or group_vars
maxwell_backend: anthropic
maxwell_anthropic_api_key: ""
maxwell_openai_api_key: ""

# TLS (leave empty to use plain HTTP on localhost only)
maxwell_tls_cert: ""
maxwell_tls_key: ""

# JWT secret (generated on first deploy if empty)
maxwell_jwt_secret: ""

# Backup retention in days
maxwell_backup_retention_days: 30

# Extra pip packages to install alongside maxwell-daemon
maxwell_extra_packages: []
