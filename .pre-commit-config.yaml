repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-untracked-todos
        name: No untracked TODO/FIXME
        entry: python scripts/check_todo_fixme.py
        language: python
        pass_filenames: true
        files: ^maxwell_daemon/.*\.py$

      - id: file-size-budget
        name: File size budget
        entry: python scripts/check_file_size_budget.py
        language: python
        pass_filenames: false
        files: ^maxwell_daemon/.*\.py$
