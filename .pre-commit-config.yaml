repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: ^uv\.lock$
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-untracked-todos
        name: No untracked TODO/FIXME
        entry: python scripts/check_todo_fixme.py
        language: python
        pass_filenames: true
        files: ^maxwell_daemon/.*\.py$

      - id: file-size-budget
        name: File size budget
        entry: python scripts/check_file_size_budget.py
        language: python
        pass_filenames: false
        files: ^maxwell_daemon/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit

  # Secrets scanning — fails the commit if a credential / API key / private
  # key is about to be committed.  Runs locally only; CI re-runs via the
  # bandit hook above plus optional dependency scanning (#797 Phase 1).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
